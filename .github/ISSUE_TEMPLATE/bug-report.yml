name: "🐛 Bug Report"
description: Report a bug in the codebase
labels:
  - "bug"
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "Node version, OS, browser"
