services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: td_user
      POSTGRES_PASSWORD: td_password
      POSTGRES_DB: td_community
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:alpine
    container_name: intern-community-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data 
    restart: always

volumes:
  postgres_data:
  redis_data:
