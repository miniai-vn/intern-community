version: '3.8'
services:
  db:
    image: postgres:15
    container_name: intern-community-db
    restart: always
    environment:
      POSTGRES_USER: khanh_dev
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: intern_hub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: